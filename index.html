<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arkadaştan Kaç!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;}
canvas{display:block;}
#ui{position:fixed;inset:0;pointer-events:none;}

/* SCREENS */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.95);z-index:100;pointer-events:all;}
.screen.active{display:flex;}

/* MENU */
#menuScreen{background:linear-gradient(180deg,#0d0020 0%,#1a0030 50%,#0a0010 100%);}
#menuScreen h1{font-family:'Creepster',cursive;font-size:clamp(2.5rem,8vw,5rem);color:#ff3333;text-shadow:0 0 30px #ff0000,0 0 60px #ff0000;margin-bottom:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{text-shadow:0 0 30px #ff0000,0 0 60px #ff0000;}50%{text-shadow:0 0 50px #ff0000,0 0 100px #ff0000,0 0 150px #ff5500;}}
#menuScreen .subtitle{color:#aaa;margin-bottom:30px;font-size:1rem;letter-spacing:3px;text-transform:uppercase;}
#menuFriendImg{width:120px;height:150px;object-fit:cover;border-radius:50% 50% 45% 45%;border:3px solid #ff3333;box-shadow:0 0 30px rgba(255,0,0,0.5);margin-bottom:25px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-10px);}}
.menu-btns{display:flex;flex-direction:column;gap:14px;width:min(320px,85vw);}
.btn{padding:18px 36px;font-size:1.2rem;font-family:'Nunito',sans-serif;font-weight:800;border:none;border-radius:50px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;pointer-events:all;}
.btn-red{background:linear-gradient(135deg,#ff3333,#cc0000);color:#fff;box-shadow:0 4px 20px rgba(255,0,0,0.4);}
.btn-red:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,0,0,0.6);}
.btn-blue{background:linear-gradient(135deg,#3388ff,#0055cc);color:#fff;box-shadow:0 4px 20px rgba(50,100,255,0.4);}
.btn-blue:hover{transform:scale(1.05);}
.btn-gray{background:linear-gradient(135deg,#444,#222);color:#ccc;}
.btn-gray:hover{transform:scale(1.05);background:linear-gradient(135deg,#555,#333);}
.btn-green{background:linear-gradient(135deg,#00cc66,#009944);color:#fff;box-shadow:0 4px 20px rgba(0,200,100,0.4);}
.btn-green:hover{transform:scale(1.05);}

/* LEVELS */
#levelsScreen{overflow-y:auto;justify-content:flex-start;padding:20px;}
#levelsScreen h2{font-family:'Creepster',cursive;font-size:2.5rem;color:#ff3333;margin-bottom:20px;margin-top:10px;}
#levelsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px;width:100%;max-width:500px;}
.level-btn{width:100%;aspect-ratio:1;border-radius:12px;border:none;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.level-locked{background:#222;color:#555;cursor:not-allowed;}
.level-done{background:linear-gradient(135deg,#ffaa00,#ff6600);color:#fff;box-shadow:0 2px 10px rgba(255,150,0,0.4);}
.level-available{background:linear-gradient(135deg,#ff3333,#cc0000);color:#fff;box-shadow:0 2px 10px rgba(255,0,0,0.3);}
.level-available:hover{transform:scale(1.1);}
.level-done:hover{transform:scale(1.1);}
#levelsBack{margin-top:20px;margin-bottom:20px;}

/* SETTINGS */
#settingsScreen h2{font-family:'Creepster',cursive;font-size:2.5rem;color:#ff3333;margin-bottom:30px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;width:min(320px,85vw);margin-bottom:20px;background:rgba(255,255,255,0.05);padding:15px 20px;border-radius:15px;}
.setting-row label{font-size:1rem;color:#ccc;}
.toggle{width:50px;height:26px;background:#333;border-radius:13px;cursor:pointer;position:relative;transition:background 0.3s;}
.toggle.on{background:#ff3333;}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left 0.3s;}
.toggle.on::after{left:26px;}
.vol-slider{width:120px;accent-color:#ff3333;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:10px 15px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:50;pointer-events:none;}
#hud.visible{display:flex;}
#hudLevel{font-family:'Creepster',cursive;font-size:1.4rem;color:#ffdd00;}
#hudScore{font-family:'Creepster',cursive;font-size:1.4rem;color:#fff;}
#hudTimer{font-family:'Creepster',cursive;font-size:1.4rem;color:#ff6666;}

/* STAMINA */
#staminaBar{position:fixed;bottom:240px;left:50%;transform:translateX(-50%);width:min(250px,60vw);z-index:50;display:none;}
#staminaBar.visible{display:block;}
#staminaLabel{font-size:0.7rem;color:#aaa;letter-spacing:2px;text-align:center;margin-bottom:3px;}
#staminaBg{height:8px;background:#333;border-radius:4px;overflow:hidden;}
#staminaFill{height:100%;background:linear-gradient(90deg,#00ff88,#00cc66);border-radius:4px;transition:width 0.1s;}

/* DPAD */
#dpad{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:8px;z-index:50;}
#dpad.visible{display:flex;}
.drow{display:flex;gap:8px;}
.db{width:68px;height:68px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);border-radius:16px;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent;transition:background 0.1s;pointer-events:all;}
.db:active,.db.pressed{background:rgba(255,100,100,0.4);border-color:rgba(255,100,100,0.6);}

/* CAUGHT */
#caughtScreen img{width:min(260px,70vw);border-radius:20px;border:4px solid #ff0000;box-shadow:0 0 50px #ff0000;animation:scareZoom 0.4s cubic-bezier(0.17,0.67,0.83,0.67);margin-bottom:15px;}
@keyframes scareZoom{0%{transform:scale(0.2) rotate(-8deg);opacity:0;}60%{transform:scale(1.12) rotate(2deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
#caughtScreen h2{font-family:'Creepster',cursive;font-size:clamp(2rem,6vw,3rem);color:#ff3333;text-shadow:0 0 20px #ff0000;margin-bottom:8px;text-align:center;}
#caughtScreen p{color:#aaa;margin-bottom:20px;text-align:center;font-size:0.95rem;}
#caughtScreen .caught-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* WIN */
#winScreen{background:linear-gradient(180deg,#001a00,#003300,#001a00);}
#winScreen h2{font-family:'Creepster',cursive;font-size:clamp(2rem,6vw,3.5rem);color:#00ff88;text-shadow:0 0 30px #00ff88;margin-bottom:8px;animation:winPulse 1s infinite;}
@keyframes winPulse{0%,100%{text-shadow:0 0 30px #00ff88;}50%{text-shadow:0 0 60px #00ff88,0 0 100px #00ffaa;}}
#winScreen p{color:#aaa;margin-bottom:10px;text-align:center;}
#winStars{font-size:2rem;margin-bottom:20px;}
#winScreen .win-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* COMPLETE */
#completeScreen{background:linear-gradient(180deg,#1a1a00,#333300,#1a1a00);}
#completeScreen h2{font-family:'Creepster',cursive;font-size:clamp(2rem,6vw,3rem);color:#ffdd00;text-shadow:0 0 30px #ffaa00;margin-bottom:10px;text-align:center;}
#completeScreen p{color:#ccc;text-align:center;margin-bottom:20px;}

/* PAUSE BTN */
#pauseBtn{position:fixed;top:55px;right:15px;z-index:60;width:38px;height:38px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:1rem;cursor:pointer;display:none;align-items:center;justify-content:center;pointer-events:all;}
#pauseBtn.visible{display:flex;}

/* PAUSE SCREEN */
#pauseScreen h2{font-family:'Creepster',cursive;font-size:2rem;color:#ffdd00;margin-bottom:25px;}
#pauseScreen .pause-btns{display:flex;flex-direction:column;gap:12px;width:min(250px,80vw);}
</style>
</head>

// ============ LEVEL CONFIG ============
function getLevelConfig(lvl) {
  const tier = Math.floor((lvl-1)/10); // 0-4
  const within = ((lvl-1)%10)+1; // 1-10
  return {
    stars: 3 + Math.floor(lvl/5),
    time: Math.max(25, 80 - lvl),
    enemySpeed: 1.4 + (lvl-1)*0.08,
    enemyCount: 1 + Math.floor((lvl-1)/15),
    wallCount: 4 + Math.floor(lvl/3),
    theme: ['night','forest','dungeon','snow','lava'][tier],
    label: ['🌙 GECE','🌲 ORMAN','⛓ ZINDAN','❄️ KAR','🔥 LAVA'][tier] + ' ' + within,
  };
}

// ============ WALL GENERATION ============
function generateWalls(count, lvl) {
  const ws = [];
  const margin = 40;
  const attempts = 200;
  // Border walls gap
  for(let i=0;i<count;i++) {
    let w, tries=0;
    do {
      const horiz = Math.random() > 0.4;
      const len = 60 + Math.random()*(H*0.2);
      const thickness = 18;
      w = horiz
        ? {x: margin+Math.random()*(W-margin*2-len), y: margin+Math.random()*(H-margin*2-thickness), w:len, h:thickness}
        : {x: margin+Math.random()*(W-margin*2-thickness), y: margin+Math.random()*(H-margin*2-len), w:thickness, h:len};
      tries++;
    } while(tries<attempts && overlapsAny(w, ws, 30));
    ws.push(w);
  }
  return ws;
}

function overlapsAny(r, list, pad) {
  for(const o of list) {
    if(r.x < o.x+o.w+pad && r.x+r.w+pad > o.x && r.y < o.y+o.h+pad && r.y+r.h+pad > o.y) return true;
  }
  return false;
}

// ============ COLLISION ============
function circleRect(cx,cy,r,rx,ry,rw,rh) {
  const nx=Math.max(rx,Math.min(cx,rx+rw));
  const ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy < r*r;
}

function tryMove(obj, dx, dy) {
  const nx=obj.x+dx, ny=obj.y+dy;
  let okX=true, okY=true;
  const margin=5;
  for(const w of walls) {
    if(circleRect(nx,obj.y,obj.r,w.x,w.y,w.w,w.h)) okX=false;
    if(circleRect(obj.x,ny,obj.r,w.x,w.y,w.w,w.h)) okY=false;
  }
  if(okX) obj.x=Math.max(obj.r+margin,Math.min(W-obj.r-margin,nx));
  if(okY) obj.y=Math.max(obj.r+margin,Math.min(H-obj.r-margin,ny));
}

// ============ INIT LEVEL ============
function initLevel(lvl) {
  const cfg = getLevelConfig(lvl);
  currentLevel = lvl;
  timeLeft = cfg.time;
  score = 0;
  stamina = 100;
  staminaRegen = false;
  particles = [];

  player = { x:60, y:H*0.5, r:20, speed:3.2, sprintSpeed:5.5 };

  walls = generateWalls(cfg.wallCount, lvl);

  // Fix player spawn
  while(walls.some(w=>circleRect(player.x,player.y,player.r+5,w.x,w.y,w.w,w.h))) {
    player.x += 5;
    if(player.x > W*0.3) { player.x=60; player.y+=40; }
  }

  // Enemies
  enemies = [];
  for(let e=0;e<cfg.enemyCount;e++) {
    let ex, ey, tries=0;
    do {
      ex = W*0.4 + Math.random()*W*0.5;
      ey = Math.random()*H*0.8+H*0.1;
      tries++;
    } while(tries<100 && (walls.some(w=>circleRect(ex,ey,30,w.x,w.y,w.w,w.h)) || Math.hypot(ex-player.x,ey-player.y)<150));
    enemies.push({
      x:ex, y:ey, r:26,
      speed: cfg.enemySpeed + e*0.2,
      img: null, imgLoaded: false,
      wobble: 0,
    });
  }

  // Load enemy image
  if(!enemyImg) {
    enemyImg = new Image();
    enemyImg.onload = () => { enemies.forEach(e=>{e.img=enemyImg;e.imgLoaded=true;}); };
    enemyImg.src = NORMAL_SRC;
  } else {
    enemies.forEach(e=>{e.img=enemyImg;e.imgLoaded=true;});
  }

  // Stars
  stars = [];
  for(let i=0;i<cfg.stars;i++) {
    let sx,sy,tries=0;
    do {
      sx=50+Math.random()*(W-100);
      sy=50+Math.random()*(H-100);
      tries++;
    } while(tries<200 && (
      walls.some(w=>circleRect(sx,sy,20,w.x,w.y,w.w,w.h)) ||
      Math.hypot(sx-player.x,sy-player.y)<80 ||
      stars.some(s=>Math.hypot(sx-s.x,sy-s.y)<50)
    ));
    stars.push({x:sx,y:sy,collected:false,pulse:Math.random()*Math.PI*2});
  }

  updateHUD();
}

// ============ HUD ============
function updateHUD() {
  const cfg = getLevelConfig(currentLevel);
  document.getElementById('hudLevel').textContent = 'B:'+currentLevel;
  document.getElementById('hudScore').textContent = '⭐'+score+'/'+cfg.stars;
  document.getElementById('hudTimer').textContent = '⏱'+timeLeft;
}

// ============ UPDATE ============
function update() {
  if(gameState!=='playing') return;

  const sprint = (keys['Shift']||keys[' ']) && stamina>0;
  const speed = sprint ? player.sprintSpeed : player.speed;

  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']||dpad.up) dy-=speed;
  if(keys['ArrowDown']||keys['s']||keys['S']||dpad.down) dy+=speed;
  if(keys['ArrowLeft']||keys['a']||keys['A']||dpad.left) dx-=speed;
  if(keys['ArrowRight']||keys['d']||keys['D']||dpad.right) dx+=speed;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  if(dx||dy) tryMove(player,dx,dy);

  // Stamina
  if(sprint&&(dx||dy)) {
    stamina=Math.max(0,stamina-0.8);
    if(stamina===0) staminaRegen=true;
  } else {
    stamina=Math.min(100,stamina+(staminaRegen?0.35:0.3));
    if(staminaRegen&&stamina>=100) staminaRegen=false;
  }
  document.getElementById('staminaFill').style.width=stamina+'%';

  // Enemy AI
  enemies.forEach(en => {
    en.wobble += 0.1;
    const edx=player.x-en.x, edy=player.y-en.y;
    const dist=Math.hypot(edx,edy);
    if(dist>0) {
      const spd = en.speed * (1+(60-timeLeft)*0.006);
      let emx=(edx/dist)*spd, emy=(edy/dist)*spd;
      // Wall avoidance
      let bx=false,by=false;
      for(const w of walls) {
        if(circleRect(en.x+emx,en.y,en.r,w.x,w.y,w.w,w.h)) bx=true;
        if(circleRect(en.x,en.y+emy,en.r,w.x,w.y,w.w,w.h)) by=true;
      }
      if(bx&&by) { emx*=-0.5; emy*=-0.5; }
      else { if(bx) emx=0; if(by) emy=0; }
      tryMove(en,emx,emy);
    }
    // Catch check
    if(Math.hypot(player.x-en.x,player.y-en.y)<player.r+en.r-5) {
      triggerCaught();
    }
  });

  // Stars
  stars.forEach(s=>{
    if(!s.collected) {
      s.pulse+=0.07;
      if(Math.hypot(s.x-player.x,s.y-player.y)<player.r+14) {
        s.collected=true;
        score++;
        spawnParticles(s.x,s.y,'#ffdd00');
        updateHUD();
        const cfg=getLevelConfig(currentLevel);
        if(score>=cfg.stars) triggerWin();
      }
    }
  });

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;p.vx*=0.95;});
}

// ============ PARTICLES ============
function spawnParticles(x,y,color) {
  for(let i=0;i<12;i++) {
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:30+Math.random()*20,color,size:3+Math.random()*4});
  }
}

// ============ DRAW ============
function draw() {
  const cfg=getLevelConfig(currentLevel);
  const th=themes[cfg.theme];

  ctx.fillStyle=th.bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle=th.grid;
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Walls
  walls.forEach(w=>{
    ctx.fillStyle=th.wall;
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle=th.wallStroke;
    ctx.lineWidth=2;
    ctx.strokeRect(w.x,w.y,w.w,w.h);
  });

  // Stars
  stars.forEach(s=>{
    if(s.collected) return;
    const sc=0.85+Math.sin(s.pulse)*0.18;
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.scale(sc,sc);
    ctx.shadowBlur=15;
    ctx.shadowColor=th.starGlow;
    ctx.font='20px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('⭐',0,0);
    ctx.restore();
  });

  // Player
  ctx.save();
  ctx.shadowBlur=20;
  ctx.shadowColor='#0088ff';
  ctx.font=`${player.r*1.4}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🏃',player.x,player.y);
  ctx.restore();

  // Enemies
  enemies.forEach(en=>{
    ctx.save();
    const wobbleOff=Math.sin(en.wobble)*2;
    if(en.imgLoaded&&en.img) {
      ctx.beginPath();
      ctx.arc(en.x,en.y+wobbleOff,en.r,0,Math.PI*2);
      ctx.clip();
      ctx.drawImage(en.img,en.x-en.r,en.y+wobbleOff-en.r,en.r*2,en.r*2);
    } else {
      ctx.font=`${en.r*1.5}px serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('😡',en.x,en.y+wobbleOff);
    }
    ctx.restore();
    // Danger glow
    const dist=Math.hypot(player.x-en.x,player.y-en.y);
    if(dist<150) {
      const a=(1-dist/150)*0.7;
      ctx.save();
      ctx.strokeStyle=`rgba(255,0,0,${a})`;
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(en.x,en.y,en.r+8+a*15,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  });

  // Particles
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life/50;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Danger vignette
  const minDist=Math.min(...enemies.map(en=>Math.hypot(player.x-en.x,player.y-en.y)));
  if(minDist<150) {
    const a=(1-minDist/150)*0.3;
    const g=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.8);
    g.addColorStop(0,'rgba(255,0,0,0)');
    g.addColorStop(1,`rgba(255,0,0,${a})`);
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);
  }
}

// ============ LOOP ============
function loop() {
  update();
  draw();
  if(gameState==='playing') animFrame=requestAnimationFrame(loop);
}

// ============ GAME FLOW ============
function startLevel(lvl) {
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  gameState='playing';
  initLevel(lvl);
  showScreen(null);

  timerInterval=setInterval(()=>{
    if(gameState!=='playing') return;
    timeLeft--;
    document.getElementById('hudTimer').textContent='⏱'+timeLeft;
    if(timeLeft<=0) triggerCaught();
  },1000);

  animFrame=requestAnimationFrame(loop);
}

function triggerCaught() {
  if(gameState!=='playing') return;
  gameState='caught';
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  if(settings.vibrate && navigator.vibrate) navigator.vibrate([200,100,400]);
  const cfg=getLevelConfig(currentLevel);
  document.getElementById('caughtMsg').textContent=`Bölüm ${currentLevel} • ${score}/${cfg.stars} yıldız topladın`;
  showScreen('caughtScreen');
}

function triggerWin() {
  if(gameState!=='playing') return;
  gameState='win';
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  if(settings.vibrate && navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  if(currentLevel>=saveData.unlocked) {
    saveData.unlocked=Math.min(50,currentLevel+1);
    save();
  }
  saveData.best=saveData.best||{};
  const key='lvl'+currentLevel;
  if(!saveData.best[key]||timeLeft>saveData.best[key]) { saveData.best[key]=timeLeft; save(); }

  const stars=Math.min(3,1+Math.floor(timeLeft/(getLevelConfig(currentLevel).time/3)));
  document.getElementById('winStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('winMsg').textContent=`Bölüm ${currentLevel} tamamlandı! ${stars}/3 ⭐`;
  document.getElementById('winNext').style.display=currentLevel<50?'block':'none';
  showScreen('winScreen');
  if(currentLevel===50) setTimeout(()=>showScreen('completeScreen'),2500);
}

function togglePause() {
  if(gameState==='playing') {
    gameState='paused';
    clearInterval(timerInterval);
    cancelAnimationFrame(animFrame);
    showScreen('pauseScreen');
  }
}

// ============ LEVELS GRID ============
function buildLevelsGrid() {
  const grid=document.getElementById('levelsGrid');
  grid.innerHTML='';
  for(let i=1;i<=50;i++) {
    const btn=document.createElement('button');
    btn.className='level-btn';
    const done=(i<saveData.unlocked);
    const avail=(i===saveData.unlocked||done);
    btn.textContent=i;
    if(!avail) btn.className+=' level-locked';
    else if(done) {btn.className+=' level-done'; btn.onclick=()=>{startLevel(i);}; }
    else {btn.className+=' level-available'; btn.onclick=()=>{startLevel(i);}; }
    grid.appendChild(btn);
  }
}

// ============ SETTINGS TOGGLES ============
function setupToggle(id, key) {
  const el=document.getElementById(id);
  el.classList.toggle('on',settings[key]);
  el.addEventListener('click',()=>{
    settings[key]=!settings[key];
    el.classList.toggle('on',settings[key]);
    saveSetts();
  });
}
setupToggle('toggleVibrate','vibrate');
setupToggle('toggleSound','sound');
setupToggle('toggleShake','shake');

// ============ BUTTON EVENTS ============
document.getElementById('menuPlay').onclick=()=>startLevel(saveData.unlocked||1);
document.getElementById('menuLevels').onclick=()=>{buildLevelsGrid();showScreen('levelsScreen');gameState='menu';};
document.getElementById('menuSettings').onclick=()=>{showScreen('settingsScreen');gameState='menu';};
document.getElementById('levelsBack').onclick=()=>showScreen('menuScreen');
document.getElementById('settingsBack').onclick=()=>showScreen('menuScreen');
document.getElementById('pauseBtn').onclick=togglePause;
document.getElementById('pauseResume').onclick=()=>{
  gameState='playing';
  showScreen(null);
  timerInterval=setInterval(()=>{
    if(gameState!=='playing') return;
    timeLeft--;
    document.getElementById('hudTimer').textContent='⏱'+timeLeft;
    if(timeLeft<=0) triggerCaught();
  },1000);
  animFrame=requestAnimationFrame(loop);
};
document.getElementById('pauseRestart').onclick=()=>startLevel(currentLevel);
document.getElementById('pauseMenu').onclick=()=>{gameState='menu';showScreen('menuScreen');};
document.getElementById('caughtRetry').onclick=()=>startLevel(currentLevel);
document.getElementById('caughtMenu').onclick=()=>{gameState='menu';showScreen('menuScreen');};
document.getElementById('winNext').onclick=()=>startLevel(currentLevel+1);
document.getElementById('winMenu').onclick=()=>{gameState='menu';showScreen('menuScreen');};
document.getElementById('completeMenu').onclick=()=>{gameState='menu';showScreen('menuScreen');};
</script>
